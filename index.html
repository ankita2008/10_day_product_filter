<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Product Filter UI</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- HEADING -->

    <div class="heading">
      <h1>Product Filter UI</h1>
      <!-- <p>Search and filter products with modern glassmorphism design</p> -->
    </div>

    <!-- FILTERS -->

    <div class="filter-section">

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search products...">
      </div>

      <div class="buttons">
        <button class="filter-btn active" data-category="All">All</button>
        <button class="filter-btn" data-category="Electronics">Electronics</button>
        <button class="filter-btn" data-category="Fashion">Fashion</button>
        <button class="filter-btn" data-category="Shoes">Shoes</button>
      </div>

    </div>

    <!-- PRODUCTS -->

    <div class="products" id="productContainer"></div>

    <div class="no-product" id="noProduct">
      No Products Found 😢
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
