<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Filter UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eef2ff, #fdf2f8);
      min-height: 100vh;
      padding: 40px 20px;
      color: #1e293b;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .title {
      text-align: center;
      margin-bottom: 35px;
    }

    .title h1 {
      font-size: 3rem;
      color: #4338ca;
      margin-bottom: 10px;
    }

    .title p {
      color: #64748b;
      font-size: 1rem;
    }

    .filter-section {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 35px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 1rem;
      background: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-btn {
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: #334155;
      font-weight: 500;
      transition: 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: #4338ca;
      color: white;
      transform: translateY(-2px);
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      overflow: hidden;
      transition: 0.3s ease;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.12);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-content {
      padding: 18px;
    }

    .category {
      display: inline-block;
      padding: 5px 12px;
      background: #e0e7ff;
      color: #4338ca;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 1.2rem;
    }

    .price {
      color: #0f172a;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .desc {
      color: #64748b;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .no-result {
      text-align: center;
      grid-column: 1/-1;
      font-size: 1.2rem;
      color: #64748b;
      padding: 40px 0;
    }

    @media (max-width: 768px) {
      .title h1 {
        font-size: 2.2rem;
      }

      .filter-section {
        flex-direction: column;
        align-items: stretch;
      }

      .buttons {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="title">
      <h1>Product Filter UI</h1>
      <p>Search and filter products by category with a modern responsive design.</p>
    </div>

    <div class="filter-section">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search products...">
      </div>

      <div class="buttons">
        <button class="filter-btn active" data-category="All">All</button>
        <button class="filter-btn" data-category="Electronics">Electronics</button>
        <button class="filter-btn" data-category="Fashion">Fashion</button>
        <button class="filter-btn" data-category="Shoes">Shoes</button>
      </div>
    </div>

    <div class="products" id="productContainer"></div>

  </div>

  <script>
    const products = [
      {
        name: 'Wireless Headphones',
        category: 'Electronics',
        price: '$120',
        image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200&auto=format&fit=crop',
        desc: 'Premium sound quality with modern wireless technology.'
      },
      {
        name: 'Smart Watch',
        category: 'Electronics',
        price: '$180',
        image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop',
        desc: 'Track fitness, calls, and notifications in style.'
      },
      {
        name: 'Casual Hoodie',
        category: 'Fashion',
        price: '$60',
        image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200&auto=format&fit=crop',
        desc: 'Comfortable and stylish hoodie for daily wear.'
      },
      {
        name: 'Running Shoes',
        category: 'Shoes',
        price: '$90',
        image: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200&auto=format&fit=crop',
        desc: 'Lightweight running shoes with modern comfort.'
      },
      {
        name: 'Denim Jacket',
        category: 'Fashion',
        price: '$75',
        image: 'https://images.unsplash.com/photo-1541099649105-f69ad21f3246?q=80&w=1200&auto=format&fit=crop',
        desc: 'Classic denim jacket with trendy design.'
      },
      {
        name: 'Sneakers',
        category: 'Shoes',
        price: '$110',
        image: 'https://images.unsplash.com/photo-1543508282-6319a3e2621f?q=80&w=1200&auto=format&fit=crop',
        desc: 'Everyday sneakers with premium finishing.'
      }
    ];

    const productContainer = document.getElementById('productContainer');
    const searchInput = document.getElementById('searchInput');
    const filterButtons = document.querySelectorAll('.filter-btn');

    let currentCategory = 'All';

    function displayProducts(items) {
      productContainer.innerHTML = '';

      if(items.length === 0) {
        productContainer.innerHTML = `<div class="no-result">No products found 😔</div>`;
        return;
      }

      items.forEach(product => {
        productContainer.innerHTML += `
          <div class="card">
            <img src="${product.image}" alt="${product.name}">
            <div class="card-content">
              <span class="category">${product.category}</span>
              <h3>${product.name}</h3>
              <div class="price">${product.price}</div>
              <p class="desc">${product.desc}</p>
            </div>
          </div>
        `;
      });
    }

    function filterProducts() {
      const searchValue = searchInput.value.toLowerCase();

      const filtered = products.filter(product => {
        const matchCategory = currentCategory === 'All' || product.category === currentCategory;

        const matchSearch = product.name.toLowerCase().includes(searchValue);

        return matchCategory && matchSearch;
      });

      displayProducts(filtered);
    }

    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        document.querySelector('.filter-btn.active').classList.remove('active');
        button.classList.add('active');

        currentCategory = button.dataset.category;
        filterProducts();
      });
    });

    searchInput.addEventListener('input', filterProducts);

    displayProducts(products);
  </script>

</body>
</html>
